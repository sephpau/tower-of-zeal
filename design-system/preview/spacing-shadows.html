<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#0F0518;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;color:#F5F5F4;font-family:'Inter',sans-serif}.s{background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.025));border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:20px;text-align:center}.s1{box-shadow:0 8px 26px rgba(0,0,0,0.34),inset 0 1px 0 rgba(255,255,255,0.05)}.s2{box-shadow:0 16px 48px rgba(0,0,0,0.46),0 0 30px rgba(255,42,85,0.25)}.s3{box-shadow:0 12px 30px rgba(251,191,36,0.4)}.l{font-family:'JetBrains Mono',monospace;font-size:10px;color:#78716C;letter-spacing:0.15em;text-transform:uppercase;margin-top:8px}.t{font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px}</style></head>
<body>
<div class="s s1"><div class="t">Card</div><div class="l">Default lift</div></div>
<div class="s s2"><div class="t">Lift + Red</div><div class="l">Hover state</div></div>
<div class="s s3" style="border-color:#FBBF24"><div class="t">Gold Glow</div><div class="l">Reward / win</div></div>
</body></html>
