<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#0F0518;color:#F5F5F4;font-family:'Inter',sans-serif}.box{position:relative;height:160px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);background:#0F0518}.glow1{position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(80px);background:#FF2A55;opacity:0.35;top:-100px;left:-50px}.glow2{position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(80px);background:#7000FF;opacity:0.35;bottom:-100px;right:-50px}.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:30px 30px}.lab{position:absolute;bottom:14px;left:16px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.18em;color:#FBBF24;text-transform:uppercase}</style></head>
<body><div class="box"><div class="glow1"></div><div class="glow2"></div><div class="grid"></div><div class="lab">◆ Void Mode · Page Background</div></div></body></html>
