<html><head><meta charset="utf-8">

<div class="s" style="background:rgba(255,255,255,0.03)"><div class="l">surface</div>0.03 white</div>
<div class="s" style="background:rgba(255,255,255,0.06)"><div class="l">surface-hover</div>0.06 white</div>
<div class="s" style="background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15)"><div class="l">glass</div>0.05 + blur</div>
<div class="s" style="background:#180B26"><div class="l">bg-s1</div>#180B26</div>
