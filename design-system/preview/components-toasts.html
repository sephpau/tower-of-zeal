<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#0F0518;color:#F5F5F4;font-family:'Inter',sans-serif}.b{display:flex;gap:10px;align-items:center;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;margin-bottom:8px}.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.ok{background:#2FD27A}.err{background:#FF5A6B}.warn{background:#FFB020}.info{background:#4DA3FF}.lab{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;flex-shrink:0;width:90px}.t{font-size:13px;color:#CFBEE4}</style></head>
<body>
<div class="b"><span class="dot ok"></span><span class="lab" style="color:#2FD27A">Success</span><span class="t">Mission complete. +24 XP.</span></div>
<div class="b"><span class="dot err"></span><span class="lab" style="color:#FF5A6B">Error</span><span class="t">Not enough coin energy. Need 12, have 7.</span></div>
<div class="b"><span class="dot warn"></span><span class="lab" style="color:#FFB020">Warning</span><span class="t">Vault key expires in 2 days.</span></div>
<div class="b"><span class="dot info"></span><span class="lab" style="color:#4DA3FF">Info</span><span class="t">New Season starts Friday.</span></div>
</body></html>
