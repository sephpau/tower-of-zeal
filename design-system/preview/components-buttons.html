<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>MoTZ Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --motz-red: #FF2A55;
    --motz-red-deep: #C71840;
    --gold: #FBBF24;
    --gold-deep: #B8860B;
    --purple: #7000FF;
    --purple-soft: #A855F7;
    --void: #0F0518;
    --ink: #050108;
    --text: #F5F5F4;
    --muted: #A8A29E;
    --dim: #78716C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 56px 48px;
    background:
      radial-gradient(ellipse 800px 500px at 20% 10%, rgba(255,42,85,0.12), transparent 60%),
      radial-gradient(ellipse 700px 500px at 85% 90%, rgba(112,0,255,0.10), transparent 60%),
      linear-gradient(180deg, #0a0314 0%, var(--void) 50%, var(--ink) 100%);
    min-height: 100vh;
    color: var(--text);
    font-family: 'Fredoka', system-ui, sans-serif;
  }
  .grid-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    gap: 40px;
  }
  .row-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .row-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
  }
  .row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* ── Base button ───────────────────────────────────────────── */
  .btn {
    position: relative;
    border: none;
    border-radius: 14px;
    padding: 14px 26px;
    font-family: 'Fredoka', system-ui, sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.005em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition:
      transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow 0.22s ease,
      filter 0.22s ease;
    isolation: isolate;
    overflow: hidden;
  }
  .btn::after {
    /* sheen */
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 30%,
      rgba(255,255,255,0.18) 45%,
      rgba(255,255,255,0.0) 60%
    );
    transform: translateX(-120%);
    transition: transform 0.6s ease;
    pointer-events: none;
  }
  .btn:hover::after { transform: translateX(120%); }
  .btn:active { transform: translateY(1px) scale(0.99); }

  /* ── Primary · Crimson signature ───────────────────────────── */
  .btn-primary {
    color: #fff;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0) 45%),
      linear-gradient(180deg, #FF3D63 0%, var(--motz-red) 50%, var(--motz-red-deep) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.32),
      inset 0 -1px 0 rgba(0,0,0,0.25),
      0 1px 0 rgba(255,255,255,0.08),
      0 6px 14px rgba(255,42,85,0.28),
      0 14px 36px rgba(255,42,85,0.32);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    filter: brightness(1.06);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.4),
      inset 0 -1px 0 rgba(0,0,0,0.25),
      0 1px 0 rgba(255,255,255,0.1),
      0 10px 22px rgba(255,42,85,0.35),
      0 22px 50px rgba(255,42,85,0.45);
  }

  /* ── Gold · Reward / claim ─────────────────────────────────── */
  .btn-gold {
    color: #2A1A00;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0) 50%),
      linear-gradient(180deg, #FFD970 0%, var(--gold) 45%, #E59700 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.7),
      inset 0 -1px 0 rgba(120,60,0,0.35),
      0 1px 0 rgba(255,255,255,0.12),
      0 6px 14px rgba(251,191,36,0.32),
      0 14px 36px rgba(251,191,36,0.30);
  }
  .btn-gold:hover {
    transform: translateY(-2px);
    filter: brightness(1.04);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.85),
      inset 0 -1px 0 rgba(120,60,0,0.35),
      0 10px 22px rgba(251,191,36,0.4),
      0 22px 50px rgba(251,191,36,0.42);
  }

  /* ── Secondary · Tonal violet ──────────────────────────────── */
  .btn-secondary {
    color: #E9D5FF;
    background:
      linear-gradient(180deg, rgba(168,85,247,0.18), rgba(112,0,255,0.08));
    border: 1px solid rgba(168,85,247,0.35);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 0 0 1px rgba(168,85,247,0.08),
      0 1px 0 rgba(0,0,0,0.4),
      0 8px 24px rgba(112,0,255,0.18);
  }
  .btn-secondary:hover {
    color: #fff;
    transform: translateY(-2px);
    border-color: rgba(168,85,247,0.55);
    background:
      linear-gradient(180deg, rgba(168,85,247,0.28), rgba(112,0,255,0.14));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.14),
      0 12px 32px rgba(112,0,255,0.30);
  }

  /* ── Ghost · Glass ──────────────────────────────────────────── */
  .btn-ghost {
    color: var(--text);
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      0 1px 0 rgba(0,0,0,0.4),
      0 6px 18px rgba(0,0,0,0.30);
  }
  .btn-ghost:hover {
    transform: translateY(-2px);
    background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
    border-color: rgba(255,255,255,0.18);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.16),
      0 10px 26px rgba(0,0,0,0.36);
  }

  /* ── Outline · Crimson stroke ──────────────────────────────── */
  .btn-outline {
    color: var(--motz-red);
    background: transparent;
    border: 1.5px solid rgba(255,42,85,0.55);
    box-shadow: inset 0 0 0 1px rgba(255,42,85,0.06);
  }
  .btn-outline:hover {
    color: #fff;
    transform: translateY(-2px);
    background: linear-gradient(180deg, rgba(255,42,85,0.18), rgba(255,42,85,0.06));
    border-color: rgba(255,42,85,0.85);
    box-shadow:
      0 0 0 1px rgba(255,42,85,0.2),
      0 10px 26px rgba(255,42,85,0.25);
  }

  /* ── Disabled ──────────────────────────────────────────────── */
  .btn-disabled {
    color: var(--dim);
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.05);
    cursor: not-allowed;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .btn-disabled::after { display: none; }
  .btn-disabled:hover { transform: none; filter: none; }

  /* ── Sizes ─────────────────────────────────────────────────── */
  .btn-lg { padding: 18px 32px; font-size: 16px; border-radius: 16px; }
  .btn-sm { padding: 10px 18px; font-size: 13px; border-radius: 10px; gap: 6px; }
  .btn-icon-only {
    width: 44px; height: 44px;
    padding: 0;
    justify-content: center;
    border-radius: 12px;
  }

  /* ── Icon styling ──────────────────────────────────────────── */
  .btn .ico {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px; height: 18px;
    flex-shrink: 0;
  }
  .btn-lg .ico { width: 20px; height: 20px; }
  .btn-sm .ico { width: 14px; height: 14px; }

  .kbd {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.7);
    margin-left: 4px;
  }
  .btn-primary .kbd { background: rgba(0,0,0,0.30); border-color: rgba(255,255,255,0.22); color: rgba(255,255,255,0.9); }
  .btn-gold .kbd { background: rgba(0,0,0,0.18); border-color: rgba(0,0,0,0.18); color: rgba(42,26,0,0.75); }
</style>
</head>
<body>
  <div class="grid-overlay"></div>

  <div class="wrap">

    <section>
      <div class="row-label">Primary actions</div>
      <div class="row">
        <button class="btn btn-primary btn-lg">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          </span>
          Play Now
        </button>
        <button class="btn btn-gold btn-lg">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1l2.6 7.6h8l-6.5 4.7 2.5 7.7L12 16.3 5.4 21l2.5-7.7L1.4 8.6h8z"/></svg>
          </span>
          Claim Reward
        </button>
        <button class="btn btn-primary">
          Mint NFT
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </span>
        </button>
      </div>
    </section>

    <section>
      <div class="row-label">Secondary &amp; ghost</div>
      <div class="row">
        <button class="btn btn-secondary">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </span>
          Connect Wallet
        </button>
        <button class="btn btn-ghost">
          View Details
        </button>
        <button class="btn btn-outline">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          </span>
          Join Discord
        </button>
        <button class="btn btn-ghost">
          Learn More
          <span class="kbd">⌘K</span>
        </button>
      </div>
    </section>

    <section>
      <div class="row-label">Sizes</div>
      <div class="row">
        <button class="btn btn-primary btn-lg">Large action</button>
        <button class="btn btn-primary">Default action</button>
        <button class="btn btn-primary btn-sm">Small</button>
        <button class="btn btn-ghost btn-icon-only" aria-label="Settings">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </span>
        </button>
      </div>
    </section>

    <section>
      <div class="row-label">Disabled state</div>
      <div class="row">
        <button class="btn btn-disabled" disabled>Vault Locked</button>
        <button class="btn btn-disabled" disabled>
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg>
          </span>
          Sold Out
        </button>
      </div>
    </section>

  </div>
</body>
</html>
