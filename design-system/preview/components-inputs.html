<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px;background:#0F0518;color:#F5F5F4;font-family:'Inter',sans-serif;display:flex;gap:14px;flex-wrap:wrap}.f{display:flex;flex-direction:column;gap:6px;min-width:220px}.lab{font-family:'JetBrains Mono',monospace;font-size:10px;color:#A8A29E;letter-spacing:0.18em;text-transform:uppercase}input,select{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:10px;color:#F5F5F4;padding:11px 14px;font-family:'Inter',sans-serif;font-size:14px;outline:none}input:focus{border-color:#FF2A55;box-shadow:0 0 0 3px rgba(255,42,85,0.2)}input::placeholder{color:#78716C}</style></head>
<body>
<div class="f"><div class="lab">Wallet</div><input placeholder="0x..."></div>
<div class="f"><div class="lab">Guild Tag</div><input value="Legends" style="border-color:#FF2A55;box-shadow:0 0 0 3px rgba(255,42,85,0.2)"></div>
<div class="f"><div class="lab">Network</div><select><option>Ronin</option><option>Arbitrum</option></select></div>
</body></html>
