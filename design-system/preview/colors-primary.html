<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#0F0518;}
.card{background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.025));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;}
.swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02)}
.sw-color{height:64px}
.sw-meta{padding:8px 10px}
.sw-name{font-family:'Fredoka',sans-serif;font-weight:700;font-size:13px;color:#F5F5F4}
.sw-hex{font-family:'JetBrains Mono',monospace;font-size:11px;color:#A8A29E;margin-top:2px}
</style></head>
<body>
<div class="card">
<div class="swatches">
<div class="sw"><div class="sw-color" style="background:#FF2A55"></div><div class="sw-meta"><div class="sw-name">MoTZ Red</div><div class="sw-hex">#FF2A55</div></div></div>
<div class="sw"><div class="sw-color" style="background:#FBBF24"></div><div class="sw-meta"><div class="sw-name">Winner Gold</div><div class="sw-hex">#FBBF24</div></div></div>
<div class="sw"><div class="sw-color" style="background:#7000FF"></div><div class="sw-meta"><div class="sw-name">Electric Purple</div><div class="sw-hex">#7000FF</div></div></div>
<div class="sw"><div class="sw-color" style="background:#0F0518;border:1px solid rgba(255,255,255,0.1)"></div><div class="sw-meta"><div class="sw-name">Void Black</div><div class="sw-hex">#0F0518</div></div></div>
</div>
</div>
</body></html>
