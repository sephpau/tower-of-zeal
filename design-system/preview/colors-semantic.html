<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#0F0518}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.s{padding:14px;border-radius:10px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px}.h{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:6px;opacity:0.85}</style></head>
<body><div class="row">
<div class="s" style="background:rgba(47,210,122,0.12);border:1px solid #2FD27A;color:#2FD27A">Success<div class="h">#2FD27A</div></div>
<div class="s" style="background:rgba(255,176,32,0.12);border:1px solid #FFB020;color:#FFB020">Warning<div class="h">#FFB020</div></div>
<div class="s" style="background:rgba(255,90,107,0.12);border:1px solid #FF5A6B;color:#FF5A6B">Error<div class="h">#FF5A6B</div></div>
<div class="s" style="background:rgba(77,163,255,0.12);border:1px solid #4DA3FF;color:#4DA3FF">Info<div class="h">#4DA3FF</div></div>
</div></body></html>
